# Android performance
android.nonTransitiveRClass=true
android.useAndroidX=true
android.enableJetifier=false

# Kotlin performance
kotlin.code.style=official
kotlin.incremental=true
kotlin.incremental.useClasspathSnapshot=true
kotlin.mpp.androidSourceSetLayoutVersion=2

# Gradle performance
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.vfs.watch=true
org.gradle.daemon=true
org.gradle.configuration-cache=true
org.gradle.configuration-cache.parallel=true
org.gradle.configureondemand=true

# JVM arguments for large projects
# Increase heap size to 8GB and use G1GC for better performance on modern systems.
# We also optimize garbage collection and allow larger Metaspace.
org.gradle.jvmargs=-Xmx4g -Xms512m -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:+UnlockExperimentalVMOptions -XX:MaxMetaspaceSize=768m -Dsun.io.useCanonicalCaches=false -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options="-Xmx3g"
